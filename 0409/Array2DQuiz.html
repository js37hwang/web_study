        function makeArray(max, formula, targetId) {
            let arr = [];
            let html = '';

            for (let i = 0; i < max; i++) {
                arr[i] = [];

                for (let j = 0; j < max; j++) {
                    arr[i][j] = formula(i, j);
                }

                console.log(arr[i]);
                html += `${arr[i]}<br/>`;
            }

            html += `<br/>`;
            document.getElementById(targetId).innerHTML = html;

            return arr;
        }

        let maxCntNum = 5;

        let arr1 = makeArray(maxCntNum, (i, j) => (i * 5) + j + 1, 'area1');
        let arr2 = makeArray(maxCntNum, (i, j) => (i * 15) + (j * 3) + 1, 'area2');
        let arr3 = makeArray(maxCntNum, (i, j) => i * j, 'area3');
        let arr4 = makeArray(maxCntNum, (i, j) => `${i}${j}`, 'area4');
