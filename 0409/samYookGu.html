<html>
    <head>
        <title>삼육구</title>
    </head>
    <body>
        <div id="resultArea"></div>
    </body>
    <script>
        // 자스 내장함수 없이 3/6/9가 들어가기만 한다면 '짝'을 출력하시오
        let startNum = 120;
        let endNum = 140;
        let resStr = ''

        // 범위에 해당하는 수 string으로 변환하여 임시 리스트에 집어넣기
        let tmpList = [];
        for(let i =startNum; i <= endNum; i++){
            tmpList.push(`${i}`);
        }

        // str으로 변환된 각 값들을 검사하여 369 존재 시 짝 출력 로직
        for(let i = 0; i < tmpList.length; i++ ){
            let flag= true; // 존재 여부 flag

            for(let j = 0; j < tmpList[i].length; j++ ){
                // if(tmpList[i][j] === '3'|| tmpList[i][j] === '6'|| tmpList[i][j] === '9'){
                //     flag = false;
                // }
                if(tmpList[i][j] % '3' === 0 && tmpList[i][j] != 0){
                    flag = false;
                }
            }
            resStr += flag? `${tmpList[i]}\n` : '짝\n';
        }

        document.getElementById('resultArea').innerText = resStr;
    </script>
</html>
