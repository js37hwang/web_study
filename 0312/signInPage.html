<html>
    <title>회원가입 페이지</title>
    <body>
        <p style="font-size: 40px; color:green; text-align: center;">
            <strong>회원가입</strong>
        </p>
        <form >
            <p>아이디 : <input type="text"  placeholder="아이디를 입력해주세요"></p>
            <p>비밀번호 : <input type="password" placeholder="비밀번호를 입력해주세요" ></p>
            <p>재확인 : <input type="password" placeholder="비밀번호를 재입력 입력해주세요" autocomplete="new-password"></p>
            <p>이름 : <input type="text" placeholder="이름을 입력해주세요" autocomplete="username"></p>
            <p>
                <span>남자 <input type="radio" name="sex" value="0"></span>
                <span>여자 <input type="radio" name="sex" value="1"></span>
            </p><br>
            <p>생년월일</p>
            <p>
                <span>연도 <input type="text" autocomplete="bday-year"></span>  
                <span>월 
                    <select id="user_month" name="month">
                        <option value="1">1월</option>
                        <option value="2">2월</option>
                        <option value="3">3월</option>
                        <option value="4">4월</option>
                        <option value="5">5월</option>
                        <option value="6">6월</option>
                        <option value="7">7월</option>
                        <option value="8">8월</option>
                        <option value="9">9월</option>
                        <option value="10">10월</option>
                        <option value="11">11월</option>
                        <option value="12">12월</option>
                    </select>
                </span>  
                <span>일 <input type="text" autocomplete="bday-day"></span>  
            </p>
            <p>
                <span>휴대폰 번호 <input type="text"> <input type="button" value="인증"></span>  
                <span>인증 번호 <input type="number"> <input type="button" value="확인"></span>  
            </p> <br>
            <input type="button" value="가입하기">
        </form>
    </body>
</html>
