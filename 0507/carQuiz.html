<html>
    <head>
        <title>return car price</title>

    <body>
        <!-- value에는 key를 담아서 뒷단에서 key랑 가격 매핑해서 계산하는게 정석임 -->
        <select name="car" id="carSelect">
            <option value="현대">현대</option>
            <option value="기아">기아</option>
            <option value="쌍용">쌍용</option>
            <option value="벤츠">벤츠</option>
            <option value="bmw">bmw</option>
        </select>
        <select name="color" id="colorSelect">
            <option value="빨강">빨강</option>
            <option value="초록">초록</option>
            <option value="노랑">노랑</option>
            <option value="검정">검정</option>
            <option value="파랑">파랑</option>
        </select>
        <!-- back단의 가격 리스트 idx와 value를 매핑해서 바로 계산하게끔 해보자~ -->

        <button id="reqBtn">요청</button>
        <div id="resArea">

    </body>
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script>
        const brandList = [
            {id:'b1',name:"현대"}
        ]
        $("#reqBtn").click(function(e){
            $.ajax({
                url: `http://localhost/carPrice`, 
                data: {
                    car: $("#carSelect").val(),
                    color: $("#colorSelect").val()
                },
                success: function(res){
                    $('#resArea').html(res.totalPrice);
                }
            })
        });
    </script>
