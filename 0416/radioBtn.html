<html>

    <script>
        let qMaxNum = 3

                        <span>4<input type="radio" name="num${i+1}" value="4"></span>
                        <span>가중치<input type="input" id="inputNum${i+1}"></span>
                    </p>
                </div>
            ` 
        }
        


        function calcNum(radioName, inputId){
            let arr = document.getElementsByName(radioName)
            let weight = Number(document.getElementById(inputId).value) // 사용자가 입력한 가중치

            if(Number.isNaN(weight)){
                alert('가중치에 숫자를 입력해주세요!')
                return;
            }

            for(let i = 0; i < arr.length; i++){
                if(arr[i].checked){
                    return {
                            radioNum : arr[i].value,
                            weight,
                        }
                }
            }
        }

</html>
