<html>
  <head>
    <title>chart</title>
  </head>
  <body>
    <div id="chart_div"></div>
  </body>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <script>
    google.charts.load('current', {packages: ['corechart', 'line']});
    google.charts.setOnLoadCallback(drawCurveTypes);

    let intervalVar = null;


    function setOptions({hAxisViewMax, vAxisViewMax}){
      return {
        hAxis: { //x축 horizen
          title: 'Time',
          viewWindow:{
            min : 0,
            max: hAxisViewMax
          }
        },
        vAxis: { //y축 vertical
          title: 'Popularity',
          viewWindow:{
            min : 0,
            max: vAxisViewMax
          }
        },
        series: {
          1: {curveType: 'function'}
        }
      }
    }
    
    function makeRandomNum(range){
      // 랜덤 수 범위 0~range-1
      return Math.floor(Math.random() * range);
    }


    function addRowsFunc(cnt){
      let dogsData = makeRandomNum(11);
      let catsData = makeRandomNum(11);
      let cowsData = makeRandomNum(11);

      console.log(`cnt : ${cnt}, dogsData : ${dogsData}, catsData : ${catsData}, cowsData : ${cowsData}`)
      console.log("cnt++", cnt++)
      return {addrows : [cnt, dogsData, catsData, cowsData], cnt : cnt++};
    }

    function resetRowsFunc(loopCnt){
      let addRowList = [];

      for(let i = 0; i <= loopCnt; i++){
        addRowList.push([i, makeRandomNum(11), makeRandomNum(11), makeRandomNum(11)])
      }
      return addRowList;
    }

    function drawCurveTypes() {
      var data = new google.visualization.DataTable();
      var chart = new google.visualization.LineChart(document.getElementById('chart_div'));
      
      let isFullChartRefreshEverySecond = true;
      let cntNum = 0;
      
      data.addColumn('number', 'X');
      data.addColumn('number', 'Dogs');
      data.addColumn('number', 'Cats');
      data.addColumn('number', 'Cows');

      data.addRows([[0,0,0,0]]) // 초기값

      
      const options = setOptions({
        hAxisViewMax : isFullChartRefreshEverySecond ? 10 : 50, 
        vAxisViewMax : 12  
      })

      intervalVal = setInterval(function(){

        if(isFullChartRefreshEverySecond){
          data.removeRows(0, data.getNumberOfRows());

          data.addRows(resetRowsFunc(10));
          chart.draw(data, options);

        }else{
          let {addrows, cnt} = addRowsFunc(cntNum);

          console.log(cnt)

          data.addRows([addrows])
          chart.draw(data, options);

          if(cnt === 50){
            clearInterval(intervalVal);
            intervalVal = null;
          }
          cntNum = cnt;
        }
      }, 1000)
    }
  </script>
</html>
